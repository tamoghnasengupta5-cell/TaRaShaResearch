name: Consumer application checks

on:
  push:
    branches:
      - agent/consumer-friendly-initial
      - consumer-v2
    paths:
      - "consumer/**"
      - ".github/workflows/consumer-checks.yml"
  pull_request:
    paths:
      - "consumer/**"
      - ".github/workflows/consumer-checks.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: consumer/package-lock.json
      - run: npm ci
      - run: npm run check
